<!DOCTYPE html>
<html lang="en">
<head>

<title>404 — ShadowPhish</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh; background:#05060e;
  font-family:'Orbitron',sans-serif; color:#fff;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center; padding:20px;

.code { font-size:120px; font-weight:900; color:#8b00ff;

  border-radius:8px; color:#fff; text-decoration:none;
  font-size:11px; font-weight:700; letter-spacing:2px;
  transition:0.2s;
}
.btn:hover { transform:scale(1.05); box-shadow:0 0 20px rgba(139,0,255,0.5); }
