<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ShadowPhish — Highway Chase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Rajdhani:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Orbitron',sans-serif; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; }
#game-wrap { position:relative; width:100vw; height:100vh; }
canvas { display:block; width:100%; height:100%; }

.hud {
  position:absolute; top:0; left:0; right:0;
  display:flex; justify-content:space-between; align-items:flex-start;
  padding:14px 20px; pointer-events:none; z-index:10;
}
.hud-block {
  background:rgba(0,0,0,0.65); border:1px solid rgba(255,255,255,0.1);
  border-radius:10px; padding:8px 14px;
  font-size:10px; color:#888; letter-spacing:1.5px; backdrop-filter:blur(8px);
}
.hud-val { font-size:17px; font-weight:800; color:#fff; }
.hud-val.dist   { color:#00ccff; text-shadow:0 0 10px rgba(0,200,255,0.5); }
.hud-val.coins  { color:#ffd700; text-shadow:0 0 10px rgba(255,215,0,0.5); }
.hud-val.hearts { color:#ff4466; text-shadow:0 0 10px rgba(255,68,102,0.5); }

.gap-bar-wrap {
  position:absolute; bottom:18px; left:20px; right:20px;
  pointer-events:none; z-index:10;
}
.gap-label {
  font-size:9px; color:#666; letter-spacing:2px;
  display:flex; justify-content:space-between; margin-bottom:5px;
}
.gap-track { height:7px; background:rgba(255,255,255,0.08); border-radius:4px; overflow:hidden; }
.gap-fill {
  height:100%; background:linear-gradient(90deg,#00ff80,#ffcc00,#ff4444);
  border-radius:4px; transition:width 0.3s, box-shadow 0.3s;
}
.gap-fill.critical { box-shadow:0 0 12px #ff4444; animation:gapPulse 0.5s infinite alternate; }
@keyframes gapPulse { from{opacity:1} to{opacity:0.55} }

.checkpoint-overlay {
  position:absolute; inset:0; background:rgba(0,0,0,0.88);
  display:none; flex-direction:column; align-items:center; justify-content:center;
  gap:14px; backdrop-filter:blur(10px); z-index:20;
}
.checkpoint-overlay.show { display:flex; }
.cp-header { font-size:18px; font-weight:800; letter-spacing:4px; color:#ffcc00; text-shadow:0 0 28px #ffcc00; }
.cp-sub { font-size:11px; color:#666; letter-spacing:2px; }
.cp-timer-bar { width:min(420px,88vw); height:5px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden; }
.cp-timer-fill { height:100%; width:100%; background:linear-gradient(90deg,#7a00ff,#ff00cc); border-radius:4px; transition:width 0.1s linear; }
.cp-progress { font-size:11px; color:#444; letter-spacing:2px; }
.cp-question { font-size:15px; color:#eee; text-align:center; max-width:min(500px,90vw); line-height:1.65; font-family:'Rajdhani',sans-serif; font-weight:700; }
.cp-answers { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:min(500px,90vw); }
.cp-ans {
  padding:13px 15px; border:1.5px solid rgba(255,255,255,0.12); border-radius:10px;
  background:rgba(255,255,255,0.05); color:#bbb;
  font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700;
  cursor:pointer; text-align:left; transition:0.2s; line-height:1.45;
}
.cp-ans:hover:not(:disabled) { background:rgba(179,0,255,0.2); border-color:rgba(179,0,255,0.5); color:#fff; }
.cp-ans.cp-correct { background:rgba(0,255,128,0.15); border-color:#00ff80; color:#00ff80; }
.cp-ans.cp-wrong   { background:rgba(255,50,50,0.15); border-color:#ff3333; color:#ff3333; }
.cp-ans:disabled   { cursor:default; }
.cp-result { font-size:12px; color:#666; text-align:center; min-height:22px; font-family:'Rajdhani',sans-serif; }
.cp-result.good { color:#00ff80; }
.cp-result.bad  { color:#ff4466; }

.end-overlay {
  position:absolute; inset:0; z-index:30; background:rgba(0,0,0,0.92);
  display:none; flex-direction:column; align-items:center; justify-content:center;
  gap:14px; backdrop-filter:blur(10px);
}
.end-overlay.show { display:flex; }
.end-card {
  padding:32px 42px; border-radius:18px; background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1); text-align:center; min-width:min(340px,90vw);
  box-shadow:0 0 60px rgba(140,0,255,0.35);
}
.end-title { font-size:22px; font-weight:800; letter-spacing:4px; margin-bottom:10px; }
.end-title.win  { color:#00ff80; text-shadow:0 0 20px #00ff80; }
.end-title.lose { color:#ff4444; text-shadow:0 0 20px #ff4444; }
.end-sub     { font-size:12px; color:#777; line-height:1.6; margin-bottom:12px; }
.end-rewards { font-size:13px; color:#ffd700; font-weight:800; margin-bottom:18px; }
.end-btn-row { display:flex; gap:10px; justify-content:center; }
.end-btn {
  padding:11px 22px; border-radius:8px; border:none;
  font-family:'Orbitron',sans-serif; font-size:10px; font-weight:800; letter-spacing:2px;
  cursor:pointer; transition:0.2s;
}
.end-btn.primary   { background:linear-gradient(90deg,#7a00ff,#ff00cc); color:#fff; }
.end-btn.primary:hover { transform:scale(1.05); }
.end-btn.secondary { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:#aaa; }

.back-link {
  position:absolute; top:16px; left:20px;
  font-size:10px; color:#555; letter-spacing:2px;
  text-decoration:none; z-index:15; pointer-events:all;
}
.back-link:hover { color:#b300ff; }

/* Touch zones — hold left/right half to steer */
.touch-zone {
  position:absolute; top:0; bottom:100px;
  width:44%; z-index:10; pointer-events:all;
}
.touch-zone.left  { left:0; }
.touch-zone.right { right:0; }
.touch-hint {
  position:absolute; bottom:110px; font-size:26px;
  opacity:0.22; pointer-events:none; z-index:10; color:#fff;
}
.touch-hint.left  { left:18px; }
.touch-hint.right { right:18px; }
</style>
</head>
<body>
<div id="game-wrap">
  <canvas id="canvas"></canvas>
  <a class="back-link" href="home.html">← HQ</a>

  <div class="hud">
    <div class="hud-block">
      <div>DISTANCE</div>
      <div class="hud-val dist"><span id="hud-dist">0</span>m</div>
    </div>
    <div class="hud-block">
      <div>COINS</div>
      <div class="hud-val coins">◈ <span id="hud-coins">0</span></div>
    </div>
    <div class="hud-block">
      <div>LIVES</div>
      <div class="hud-val hearts"><span id="hud-hearts">♥♥♥</span></div>
    </div>
  </div>

  <div class="gap-bar-wrap">
    <div class="gap-label"><span>YOU</span><span>SHADOWPHISH GAP</span><span>ESCAPED</span></div>
    <div class="gap-track"><div class="gap-fill" id="gap-fill" style="width:30%"></div></div>
  </div>

  <div class="checkpoint-overlay" id="cp-overlay">
    <div class="cp-header">⚡ QUESTION ZONE</div>
    <div class="cp-sub">3/3 CORRECT = SPEED BOOST &nbsp;|&nbsp; ANSWER TO CLOSE THE GAP</div>
    <div class="cp-timer-bar"><div class="cp-timer-fill" id="cp-timer"></div></div>
    <div class="cp-progress" id="cp-prog">QUESTION 1 / 3</div>
    <div class="cp-question" id="cp-question"></div>
    <div class="cp-answers" id="cp-answers"></div>
    <div class="cp-result" id="cp-result"></div>
  </div>

  <div class="touch-zone left"  id="tz-left"></div>
  <div class="touch-zone right" id="tz-right"></div>
  <div class="touch-hint left">◀</div>
  <div class="touch-hint right">▶</div>

  <div class="end-overlay" id="end-overlay">
    <div class="end-card">
      <div class="end-title" id="end-title">MISSION COMPLETE</div>
      <div class="end-sub"     id="end-sub"></div>
      <div class="end-rewards" id="end-rewards"></div>
      <div class="end-btn-row">
        <button class="end-btn primary"   onclick="window.location.href='chase.html'">PLAY AGAIN</button>
        <button class="end-btn secondary" onclick="window.location.href='home.html'">HOME</button>
      </div>
    </div>
  </div>
</div>

<script>
const CP_QUESTIONS = [
  { q:"Which is a sign of a phishing email?",
    opts:["Urgent call to action + suspicious sender domain","Formal greeting and company logo","Reply-to matches sender","Email contains no links"], ans:0 },
  { q:"What does 'smishing' refer to?",
    opts:["Phishing via SMS text messages","Phishing via email","Phishing via voice calls","Phishing via social media"], ans:0 },
  { q:"A URL showing 'paypa1.com' instead of 'paypal.com' is an example of:",
    opts:["Typosquatting","Pharming","Spoofing","Vishing"], ans:0 },
  { q:"What should you do when you receive an urgent payment request from your 'CEO' by email only?",
    opts:["Call the CEO directly to verify","Process it — it's urgent","Reply to the email to confirm","Forward to your team"], ans:0 },
  { q:"Multi-Factor Authentication (MFA) protects your account by:",
    opts:["Requiring a second form of verification beyond just a password","Encrypting your password","Hiding your email address","Blocking all unknown senders"], ans:0 },
  { q:"Which domain is legitimate for a government website?",
    opts:["gov.example.gov","example-gov.com","example.gov.support.net","gov-example-official.com"], ans:0 },
  { q:"A pop-up says 'Call Microsoft Support at 1-800-XXX' to fix a virus. You should:",
    opts:["Close the browser — this is a tech support scam","Call the number immediately","Download the offered tool","Enter your email for a free scan"], ans:0 },
  { q:"Spear phishing differs from regular phishing because it is:",
    opts:["Targeted at a specific person using personal information","Sent to millions of people","Delivered via SMS","Conducted over the phone"], ans:0 },
  { q:"Before clicking a link in an email, you should:",
    opts:["Hover over it to check the real URL","Click it to see where it goes","Copy it and search Google","Ask a colleague to click it first"], ans:0 },
  { q:"Which action best protects you from credential theft?",
    opts:["Using a unique strong password + MFA on every account","Using the same password everywhere for easy recall","Changing your password every day","Writing it on paper and keeping it at your desk"], ans:0 },
  { q:"What does a padlock icon in the browser address bar guarantee?",
    opts:["The connection is encrypted — but NOT that the site is safe","The site is completely safe to use","The site is verified by the government","Your payment details are protected"], ans:0 },
  { q:"A stranger on social media asks for your date of birth to 'verify your identity'. You should:",
    opts:["Refuse — this is a social engineering attempt to harvest personal data","Share it — it is public information","Share just the year, not the full date","Ask them to verify themselves first"], ans:0 },
  { q:"A website URL starts with 'http://' instead of 'https://'. This means:",
    opts:["The connection is unencrypted — your data could be intercepted","The site is definitely a phishing page","The site is faster to load","The site is safe for shopping"], ans:0 },
  { q:"What is 'whaling' in cybersecurity?",
    opts:["Targeted phishing attacks aimed at senior executives (CEO, CFO)","Phishing attacks on fishing industry websites","Mass email phishing targeting millions","Attacks via WhatsApp messages"], ans:0 },
  { q:"What is 'vishing'?",
    opts:["Voice call phishing — scammers call pretending to be trusted organisations","A type of malware","Phishing via video","Phishing via email"], ans:0 },
  { q:"An email urges you to 'ACT NOW or your account is closed'. This urgency is a sign of:",
    opts:["Social engineering — designed to prevent you from thinking clearly","Legitimate security measure","Automated notification","Password reset reminder"], ans:0 },
];

// ── Canvas ──
const canvas = document.getElementById("canvas");
const ctx    = canvas.getContext("2d");
let W, H;

function resizeCanvas() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildCanyonProfile();
}
window.addEventListener("resize", resizeCanvas);

// ── Perspective ──
const HORIZ_FRAC  = 0.36;   // horizon at 36% from top
const ROAD_NEAR_W = 1.04;   // road wider than screen — fills edge to edge
const ROAD_FAR_W  = 80;     // road width px at horizon (wider = less triangular)

function project(depth, lanePos) {
  const hy = H * HORIZ_FRAC;
  const sy = hy + (H - hy) * depth;
  const rw = ROAD_FAR_W + (W * ROAD_NEAR_W - ROAD_FAR_W) * depth;
  const sx = W / 2 + lanePos * rw / 2;
  return { x: sx, y: sy, scale: Math.max(0.04, depth), rw };
}

// ── Canyon profile ──
let CANYON_L = [], CANYON_R = [];
function seededRng(seed) {
  let s = seed;
  return () => { s = (s*1664525+1013904223)&0xffffffff; return (s>>>0)/0xffffffff; };
}
function buildCanyonProfile() {
  const rng = seededRng(42);
  CANYON_L = []; CANYON_R = [];
  for (let i = 0; i <= 28; i++) { CANYON_L.push(0.12 + rng()*0.30); }
  for (let i = 0; i <= 28; i++) { CANYON_R.push(0.10 + rng()*0.28); }
}

// ── Player ──
let playerX  = 0;    // -1 … +1 (normalized road position)
let playerVX = 0;    // velocity
let leanAngle = 0;   // camera tilt radians
const MAX_PX   = 0.82;
const ACCEL    = 0.020;
const FRICTION = 0.80;
const MAX_VX   = 0.060;

// ── Traffic lanes ──
const T_LANES = [-0.62, -0.21, 0.21, 0.62];
const COLL_TOL = 0.22;

// ── Game state ──
let state = {
  running:false, paused:false,
  distance:0, speed:3.5,
  coins:0, hearts:3,
  gap:30,
  frame:0, dashPhase:0,
  obstacles:[], pickups:[], particles:[],
  invincible:0, boosting:0,
  barrier:null,
  nextCheckDist:1500,
  milestones:{},
};

// ── Input ──
const keysHeld  = { left:false, right:false };
const touchHeld = { left:false, right:false };

document.addEventListener("keydown", e => {
  if (!state.running || state.paused) return;
  if (e.key==="ArrowLeft" ||e.key==="a"||e.key==="A") keysHeld.left  = true;
  if (e.key==="ArrowRight"||e.key==="d"||e.key==="D") keysHeld.right = true;
  if ((e.key==="p"||e.key==="P") && state.running) {
    state.paused = !state.paused; if (!state.paused) loop();
  }
});
document.addEventListener("keyup", e => {
  if (e.key==="ArrowLeft" ||e.key==="a"||e.key==="A") keysHeld.left  = false;
  if (e.key==="ArrowRight"||e.key==="d"||e.key==="D") keysHeld.right = false;
});

const tzL = document.getElementById("tz-left");
const tzR = document.getElementById("tz-right");
tzL.addEventListener("touchstart", e => { e.preventDefault(); touchHeld.left  = true; }, {passive:false});
tzL.addEventListener("touchend",   ()  => { touchHeld.left  = false; });
tzL.addEventListener("touchcancel",()  => { touchHeld.left  = false; });
tzR.addEventListener("touchstart", e => { e.preventDefault(); touchHeld.right = true; }, {passive:false});
tzR.addEventListener("touchend",   ()  => { touchHeld.right = false; });
tzR.addEventListener("touchcancel",()  => { touchHeld.right = false; });
tzL.addEventListener("mousedown",  ()  => { touchHeld.left  = true;  });
document.addEventListener("mouseup", ()  => { touchHeld.left = touchHeld.right = false; });
tzR.addEventListener("mousedown",  ()  => { touchHeld.right = true;  });

// ── Helpers ──
function lerp(a, b, t) { return a + (b-a)*t; }
function getPlayerState() {
  return JSON.parse(localStorage.getItem("sp_state")) || {
    coins:50, hintTokens:3, hearts:5, maxHearts:5,
    lastHeartTime:Date.now(), xp:0, level:1, intelDone:0, chaseDone:0,
    highestDistance:0
  };
}
function savePlayerState(s) { localStorage.setItem("sp_state", JSON.stringify(s)); }

function updateHUD() {
  document.getElementById("hud-dist").textContent   = Math.floor(state.distance);
  document.getElementById("hud-coins").textContent  = state.coins;
  document.getElementById("hud-hearts").textContent = "♥".repeat(Math.max(0,state.hearts));
  document.getElementById("gap-fill").style.width   = state.gap + "%";
}

// ── Draw sky (desert sunset) ──
function drawSky() {
  const hy = H * HORIZ_FRAC;

  const g = ctx.createLinearGradient(0, 0, 0, hy);
  g.addColorStop(0,    "#1b3d5f");
  g.addColorStop(0.28, "#bf5518");
  g.addColorStop(0.60, "#e8902a");
  g.addColorStop(0.83, "#f5be38");
  g.addColorStop(1,    "#f9e49a");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, hy);

  // Sun
  const sx = W*0.62, sy = hy*0.28;
  const sg = ctx.createRadialGradient(sx, sy, 1, sx, sy, 52);
  sg.addColorStop(0,   "#ffffff");
  sg.addColorStop(0.18,"#ffe87a");
  sg.addColorStop(0.55,"rgba(255,195,40,0.28)");
  sg.addColorStop(1,   "rgba(255,140,0,0)");
  ctx.fillStyle = sg;
  ctx.beginPath(); ctx.arc(sx, sy, 52, 0, Math.PI*2); ctx.fill();

  // Haze band at horizon
  const hz = ctx.createLinearGradient(0, hy*0.78, 0, hy);
  hz.addColorStop(0, "rgba(249,225,140,0)");
  hz.addColorStop(1, "rgba(252,238,180,0.58)");
  ctx.fillStyle = hz;
  ctx.fillRect(0, hy*0.78, W, hy*0.22);

  // Canyon silhouettes
  const rlFar = W/2 - ROAD_FAR_W/2;
  const rrFar = W/2 + ROAD_FAR_W/2;
  const n = CANYON_L.length - 1;

  // Left canyon — smooth bezier curves, not sharp spikes
  ctx.fillStyle = "#7a3312";
  ctx.beginPath();
  ctx.moveTo(0, hy);
  ctx.lineTo(0, hy * 0.15);
  for (let i = 0; i <= n; i++) {
    const x = (i/n) * rlFar;
    const y = hy - CANYON_L[i]*hy*0.60;
    if (i === 0) ctx.lineTo(x, y);
    else {
      const px = ((i-1)/n)*rlFar;
      const py = hy - CANYON_L[i-1]*hy*0.60;
      ctx.bezierCurveTo(px + (x-px)*0.5, py, px + (x-px)*0.5, y, x, y);
    }
  }
  ctx.lineTo(rlFar, hy);
  ctx.closePath(); ctx.fill();

  // Right canyon — smooth
  ctx.fillStyle = "#7a3312";
  ctx.beginPath();
  ctx.moveTo(W, hy);
  ctx.lineTo(W, hy * 0.15);
  for (let i = n; i >= 0; i--) {
    const x = rrFar + (i/n)*(W-rrFar);
    const y = hy - CANYON_R[i]*hy*0.60;
    if (i === n) ctx.lineTo(x, y);
    else {
      const nx = rrFar + ((i+1)/n)*(W-rrFar);
      const ny = hy - CANYON_R[i+1]*hy*0.60;
      ctx.bezierCurveTo(nx - (nx-x)*0.5, ny, nx - (nx-x)*0.5, y, x, y);
    }
  }
  ctx.lineTo(rrFar, hy);
  ctx.closePath(); ctx.fill();

  // Second darker layer for depth
  ctx.fillStyle = "rgba(45,14,4,0.50)";
  ctx.beginPath(); ctx.moveTo(0,hy); ctx.lineTo(0, hy*0.62); ctx.quadraticCurveTo(rlFar*0.3, hy*0.72, rlFar*0.55, hy); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(W,hy); ctx.lineTo(W, hy*0.62); ctx.quadraticCurveTo(rrFar+(W-rrFar)*0.7, hy*0.72, rrFar+(W-rrFar)*0.45, hy); ctx.closePath(); ctx.fill();
}

// ── Draw road ──
function drawRoad() {
  const hy    = H * HORIZ_FRAC;
  const vpx   = W / 2;
  const rlFar  = vpx - ROAD_FAR_W/2,   rrFar  = vpx + ROAD_FAR_W/2;
  const rlNear = vpx - W*ROAD_NEAR_W/2, rrNear = vpx + W*ROAD_NEAR_W/2;

  // No visible shoulder — road fills the screen edge to edge

  // Asphalt — perspective-shaded strips
  const STRIPS = 20;
  for (let i = 0; i < STRIPS; i++) {
    const t0 = i/STRIPS, t1 = (i+1)/STRIPS;
    const y0 = hy+(H-hy)*t0, y1 = hy+(H-hy)*t1;
    const xl0 = lerp(rlFar,rlNear,t0), xr0 = lerp(rrFar,rrNear,t0);
    const xl1 = lerp(rlFar,rlNear,t1), xr1 = lerp(rrFar,rrNear,t1);
    const lum = 42 + Math.floor(i*1.4) + (i%2)*4;
    ctx.fillStyle = `rgb(${lum},${lum},${lum+3})`;
    ctx.beginPath();
    ctx.moveTo(xl0,y0); ctx.lineTo(xr0,y0);
    ctx.lineTo(xr1,y1); ctx.lineTo(xl1,y1);
    ctx.closePath(); ctx.fill();
  }

  // Road edge — guardrails visible only near horizon where road still fits in screen
  ctx.strokeStyle = "rgba(255,255,255,0.55)"; ctx.lineWidth = 2.5; ctx.shadowBlur = 0;
  if (rlFar >= 0) { ctx.beginPath(); ctx.moveTo(rlFar,hy); ctx.lineTo(Math.max(0,rlNear),H); ctx.stroke(); }
  if (rrFar <= W) { ctx.beginPath(); ctx.moveTo(rrFar,hy); ctx.lineTo(Math.min(W,rrNear),H); ctx.stroke(); }

  // Animated dashed lane lines
  state.dashPhase = (state.dashPhase + state.speed*0.016) % 1;
  const DASHES = 14;
  [1/4, 2/4, 3/4].forEach((frac, fi) => {
    const isCenter = fi === 1;
    if (isCenter) {
      // Double yellow center line
      [-3, 3].forEach(off => {
        ctx.strokeStyle = "rgba(240,210,0,0.80)"; ctx.lineWidth = 1.8;
        const x0f = rlFar  + (rrFar  - rlFar)*frac  + off * (ROAD_FAR_W/(W*ROAD_NEAR_W));
        const x1f = rlNear + (rrNear - rlNear)*frac  + off;
        ctx.beginPath(); ctx.moveTo(x0f, hy); ctx.lineTo(x1f, H); ctx.stroke();
      });
    } else {
      for (let d = 0; d < DASHES; d++) {
        let t0 = ((d + state.dashPhase)/DASHES) % 1;
        let t1 = ((d + 0.42 + state.dashPhase)/DASHES) % 1;
        if (t0 > t1) continue;
        const y0 = hy+(H-hy)*t0, y1 = hy+(H-hy)*t1;
        const rw0 = ROAD_FAR_W+(W*ROAD_NEAR_W-ROAD_FAR_W)*t0;
        const rw1 = ROAD_FAR_W+(W*ROAD_NEAR_W-ROAD_FAR_W)*t1;
        const x0 = vpx - rw0/2 + rw0*frac;
        const x1 = vpx - rw1/2 + rw1*frac;
        ctx.strokeStyle = `rgba(255,255,255,${0.20+0.28*t0})`;
        ctx.lineWidth = 1.5*t0 + 0.5;
        ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
      }
    }
  });
}

// ── Draw barrier (checkpoint) ──
function drawBarrier() {
  if (!state.barrier) return;
  const d  = state.barrier.depth;
  const pL = project(d, -1), pR = project(d, 1);
  const bW = pR.x - pL.x, bH = Math.max(4, 30*d);
  const bx = pL.x, by = pL.y - bH/2;
  const pulse = 0.75 + 0.25*Math.sin(state.frame*0.22);

  ctx.save();
  ctx.globalAlpha = pulse * Math.min(1, d*2.5);
  ctx.shadowBlur = 22*d; ctx.shadowColor = "#ff6600";

  const SW = Math.max(16, bW/10);
  ctx.save();
  ctx.beginPath(); ctx.rect(bx, by, bW, bH); ctx.clip();
  for (let i = -2; i < bW/SW+2; i++) {
    ctx.fillStyle = i%2===0 ? "#ff6600" : "#111";
    ctx.beginPath();
    ctx.moveTo(bx+i*SW, by);
    ctx.lineTo(bx+i*SW+SW, by);
    ctx.lineTo(bx+i*SW+SW-bH*0.7, by+bH);
    ctx.lineTo(bx+i*SW-bH*0.7, by+bH);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
  ctx.strokeStyle="#ff8800"; ctx.lineWidth=2; ctx.strokeRect(bx,by,bW,bH);
  if (d > 0.22) {
    ctx.shadowBlur=14; ctx.shadowColor="#ffcc00";
    ctx.fillStyle="#ffcc00";
    ctx.font=`bold ${Math.floor(13*d)}px Orbitron,sans-serif`;
    ctx.textAlign="center";
    ctx.fillText("⚡ CHECKPOINT", W/2, by-8);
  }
  ctx.globalAlpha = 1; ctx.restore();
}

// ── Car drawing helpers ──
function hexShade(hex, amt) {
  const r = Math.max(0,Math.min(255,parseInt(hex.slice(1,3),16)+amt));
  const g = Math.max(0,Math.min(255,parseInt(hex.slice(3,5),16)+amt));
  const b = Math.max(0,Math.min(255,parseInt(hex.slice(5,7),16)+amt));
  return `#${r.toString(16).padStart(2,"0")}${g.toString(16).padStart(2,"0")}${b.toString(16).padStart(2,"0")}`;
}

const CAR_COLORS = ["#cccccc","#2244aa","#883322","#226633","#222222","#aa4422","#336688","#885500"];
const CAR_GLOWS  = ["#ffffff","#4466ff","#ff6633","#44cc66","#888888","#ff6644","#55aaff","#ffaa22"];

// Car seen from BEHIND (you're overtaking)
function drawCarBehind(p, col, glow) {
  const cw = Math.max(44, W*0.072*p.scale), ch = cw*1.42;
  const x = p.x, y = p.y;
  ctx.save();
  ctx.shadowBlur = 6*p.scale; ctx.shadowColor = glow;

  // 3D side panel (left)
  ctx.fillStyle = hexShade(col,-45);
  ctx.beginPath();
  ctx.moveTo(x-cw/2, y-ch); ctx.lineTo(x-cw/2-8*p.scale, y-ch*0.82);
  ctx.lineTo(x-cw/2-8*p.scale, y); ctx.lineTo(x-cw/2, y);
  ctx.closePath(); ctx.fill();

  // Main body
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.roundRect(x-cw/2, y-ch, cw, ch, 4*p.scale); ctx.fill();

  // Rear window
  ctx.fillStyle = "rgba(28,55,95,0.72)";
  ctx.beginPath(); ctx.roundRect(x-cw*0.37, y-ch*0.90, cw*0.74, ch*0.30, 3*p.scale); ctx.fill();

  // Window frame
  ctx.strokeStyle = "rgba(180,180,180,0.25)"; ctx.lineWidth = 0.8*p.scale;
  ctx.strokeRect(x-cw*0.37, y-ch*0.90, cw*0.74, ch*0.30);

  // Trunk seam
  ctx.strokeStyle = hexShade(col,-25); ctx.lineWidth = p.scale;
  ctx.beginPath(); ctx.moveTo(x-cw/2, y-ch*0.27); ctx.lineTo(x+cw/2, y-ch*0.27); ctx.stroke();

  // Taillights
  ctx.shadowBlur = 14*p.scale; ctx.shadowColor = "#ff1111";
  ctx.fillStyle = "#ff2222";
  ctx.beginPath(); ctx.roundRect(x-cw/2+cw*0.06, y-ch*0.17, cw*0.21, ch*0.09, 2*p.scale); ctx.fill();
  ctx.beginPath(); ctx.roundRect(x+cw/2-cw*0.27, y-ch*0.17, cw*0.21, ch*0.09, 2*p.scale); ctx.fill();

  // Reverse / fog light (center dim)
  ctx.shadowBlur = 0;
  ctx.fillStyle = "rgba(255,240,180,0.35)";
  ctx.beginPath(); ctx.roundRect(x-cw*0.10, y-ch*0.09, cw*0.20, ch*0.05, 1*p.scale); ctx.fill();

  // License plate
  ctx.fillStyle = "#e8e8c0";
  ctx.fillRect(x-cw*0.17, y-ch*0.085, cw*0.34, ch*0.055);

  ctx.restore();
}

// Car coming HEAD-ON (oncoming traffic)
function drawCarFront(p, col, glow) {
  const cw = Math.max(44, W*0.072*p.scale), ch = cw*1.42;
  const x = p.x, y = p.y;
  ctx.save();
  ctx.shadowBlur = 6*p.scale; ctx.shadowColor = glow;

  ctx.fillStyle = col;
  ctx.beginPath(); ctx.roundRect(x-cw/2, y-ch, cw, ch, 4*p.scale); ctx.fill();

  // Windshield
  ctx.fillStyle = "rgba(90,150,210,0.65)";
  ctx.beginPath(); ctx.roundRect(x-cw*0.36, y-ch*0.84, cw*0.72, ch*0.28, 3*p.scale); ctx.fill();
  ctx.strokeStyle="rgba(200,200,200,0.25)"; ctx.lineWidth=0.8*p.scale; ctx.stroke();

  // Hood seam
  ctx.strokeStyle = hexShade(col,-20); ctx.lineWidth = p.scale;
  ctx.beginPath(); ctx.moveTo(x-cw/2, y-ch*0.52); ctx.lineTo(x+cw/2, y-ch*0.52); ctx.stroke();

  // Headlights
  ctx.shadowBlur = 18*p.scale; ctx.shadowColor = "#ffffff";
  ctx.fillStyle = "#ffffff";
  ctx.beginPath(); ctx.roundRect(x-cw/2+cw*0.06, y-ch*0.17, cw*0.22, ch*0.10, 2*p.scale); ctx.fill();
  ctx.beginPath(); ctx.roundRect(x+cw/2-cw*0.28, y-ch*0.17, cw*0.22, ch*0.10, 2*p.scale); ctx.fill();

  // Grille
  ctx.shadowBlur = 0;
  ctx.fillStyle = "#111";
  ctx.fillRect(x-cw*0.28, y-ch*0.40, cw*0.56, ch*0.12);

  ctx.restore();
}

// ── Draw obstacles ──
function drawObstacles() {
  [...state.obstacles].sort((a,b)=>a.depth-b.depth).forEach(ob => {
    const p = project(ob.depth, ob.laneX);
    if (p.y < H*HORIZ_FRAC) return;
    const ci = ob.colorIdx % CAR_COLORS.length;
    ob.oncoming ? drawCarFront(p, CAR_COLORS[ci], CAR_GLOWS[ci])
                : drawCarBehind(p, CAR_COLORS[ci], CAR_GLOWS[ci]);
  });
}

// ── Draw pickups (coins) ──
function drawPickups() {
  [...state.pickups].sort((a,b)=>a.depth-b.depth).forEach(pk => {
    const p = project(pk.depth, pk.laneX);
    if (p.y < H*HORIZ_FRAC) return;
    const r = Math.max(5, 14*p.scale);
    ctx.save();
    ctx.shadowBlur = 16*p.scale; ctx.shadowColor="#ffd700";
    ctx.fillStyle="#ffd700";
    ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.fill();
    if (r > 7) {
      ctx.fillStyle="#fff";
      ctx.font=`bold ${Math.floor(r*1.1)}px sans-serif`;
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText("◈", p.x, p.y);
    }
    ctx.restore();
  });
}

// ── Draw particles ──
function drawParticles() {
  state.particles = state.particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.life--;
    const a = p.life/30;
    ctx.beginPath(); ctx.arc(p.x, p.y, 3*a, 0, Math.PI*2);
    ctx.fillStyle = p.color + Math.floor(a*255).toString(16).padStart(2,"0");
    ctx.fill();
    return p.life > 0;
  });
}

// ── Draw cockpit (handlebar view) ──
function drawCockpit() {
  if (state.invincible > 0 && state.frame%6 < 3) return;

  const cx = W/2;
  // Dashboard fairing at bottom — curved black panel
  ctx.fillStyle = "#0c0c0c";
  ctx.beginPath();
  ctx.moveTo(0, H);
  ctx.lineTo(0, H*0.86);
  ctx.quadraticCurveTo(W*0.22, H*0.78, cx, H*0.80);
  ctx.quadraticCurveTo(W*0.78, H*0.78, W, H*0.86);
  ctx.lineTo(W, H);
  ctx.closePath(); ctx.fill();

  // Fairing top highlight
  ctx.strokeStyle = "rgba(255,255,255,0.06)"; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, H*0.86);
  ctx.quadraticCurveTo(W*0.22, H*0.78, cx, H*0.80);
  ctx.quadraticCurveTo(W*0.78, H*0.78, W, H*0.86);
  ctx.stroke();

  const hy_bar = H*0.82; // handlebar vertical center

  // Lean applied to handlebar assembly
  ctx.save();
  ctx.translate(cx, hy_bar);
  ctx.rotate(leanAngle * 0.20);
  ctx.translate(-cx, -hy_bar);

  // Left bar shadow
  ctx.shadowBlur = 0;
  ctx.strokeStyle = "#2a2a2a"; ctx.lineWidth = 18; ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(cx-16, hy_bar);
  ctx.quadraticCurveTo(cx-100, hy_bar-15, cx-W*0.30, hy_bar+28);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx+16, hy_bar);
  ctx.quadraticCurveTo(cx+100, hy_bar-15, cx+W*0.30, hy_bar+28);
  ctx.stroke();

  // Chrome tube gradient — left
  const lgL = ctx.createLinearGradient(cx-W*0.30, hy_bar+28, cx-16, hy_bar);
  lgL.addColorStop(0,"#5a5a5a"); lgL.addColorStop(0.35,"#d8d8d8"); lgL.addColorStop(0.65,"#f5f5f5"); lgL.addColorStop(1,"#7a7a7a");
  ctx.strokeStyle = lgL; ctx.lineWidth = 13;
  ctx.beginPath();
  ctx.moveTo(cx-16, hy_bar);
  ctx.quadraticCurveTo(cx-100, hy_bar-15, cx-W*0.30, hy_bar+28);
  ctx.stroke();

  // Chrome tube gradient — right
  const lgR = ctx.createLinearGradient(cx+16, hy_bar, cx+W*0.30, hy_bar+28);
  lgR.addColorStop(0,"#7a7a7a"); lgR.addColorStop(0.35,"#f5f5f5"); lgR.addColorStop(0.65,"#d8d8d8"); lgR.addColorStop(1,"#5a5a5a");
  ctx.strokeStyle = lgR; ctx.lineWidth = 13;
  ctx.beginPath();
  ctx.moveTo(cx+16, hy_bar);
  ctx.quadraticCurveTo(cx+100, hy_bar-15, cx+W*0.30, hy_bar+28);
  ctx.stroke();

  // Rubber grips
  ctx.strokeStyle = "#1e1e1e"; ctx.lineWidth = 16; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(cx-W*0.24, hy_bar+24); ctx.lineTo(cx-W*0.29, hy_bar+27); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+W*0.24, hy_bar+24); ctx.lineTo(cx+W*0.29, hy_bar+27); ctx.stroke();

  // Grip texture lines
  ctx.strokeStyle = "rgba(255,255,255,0.08)"; ctx.lineWidth = 2;
  for (let i = 0; i < 4; i++) {
    const t = i/4;
    const gx = lerp(cx-W*0.24, cx-W*0.29, t);
    const gy = lerp(hy_bar+24, hy_bar+27, t);
    ctx.beginPath(); ctx.moveTo(gx-3, gy-5); ctx.lineTo(gx+3, gy+5); ctx.stroke();
    const gxR = lerp(cx+W*0.24, cx+W*0.29, t);
    ctx.beginPath(); ctx.moveTo(gxR-3, gy-5); ctx.lineTo(gxR+3, gy+5); ctx.stroke();
  }

  // Center hub
  const hubG = ctx.createRadialGradient(cx, hy_bar, 0, cx, hy_bar, 30);
  hubG.addColorStop(0,"#bbb"); hubG.addColorStop(0.6,"#555"); hubG.addColorStop(1,"#222");
  ctx.fillStyle = hubG; ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.arc(cx, hy_bar, 28, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle="#666"; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(cx, hy_bar, 28, 0, Math.PI*2); ctx.stroke();

  // Speedometer face
  ctx.fillStyle="#080808";
  ctx.beginPath(); ctx.arc(cx, hy_bar, 21, 0, Math.PI*2); ctx.fill();

  // Speed ticks
  ctx.strokeStyle="rgba(255,255,255,0.45)"; ctx.lineWidth=1.2;
  for (let t = 0; t <= 1; t += 0.2) {
    const ang = Math.PI*0.75 + t*Math.PI*1.5;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(ang)*16, hy_bar+Math.sin(ang)*16);
    ctx.lineTo(cx+Math.cos(ang)*20, hy_bar+Math.sin(ang)*20);
    ctx.stroke();
  }

  // Speed needle
  const speedFrac = Math.min(1, state.speed/16);
  const nAng = Math.PI*0.75 + speedFrac*Math.PI*1.5;
  ctx.shadowBlur=8; ctx.shadowColor="#ff4400";
  ctx.strokeStyle="#ff4400"; ctx.lineWidth=2; ctx.lineCap="round";
  ctx.beginPath();
  ctx.moveTo(cx, hy_bar);
  ctx.lineTo(cx+Math.cos(nAng)*14, hy_bar+Math.sin(nAng)*14);
  ctx.stroke();
  ctx.shadowBlur=0;

  ctx.restore(); // end lean

  // Boost flame (below bar, coming from exhaust between legs)
  if (state.boosting > 0) {
    const flicker = Math.random()*18;
    const fg = ctx.createLinearGradient(cx, H, cx, H - 90 - flicker);
    fg.addColorStop(0,"rgba(255,80,0,0)");
    fg.addColorStop(0.4,"rgba(255,140,0,0.75)");
    fg.addColorStop(1,"rgba(255,220,0,0.95)");
    ctx.fillStyle=fg; ctx.shadowBlur=28; ctx.shadowColor="#ff7700";
    ctx.beginPath();
    ctx.moveTo(cx-14,H); ctx.lineTo(cx+14,H);
    ctx.lineTo(cx+5, H-90-flicker); ctx.lineTo(cx-5, H-90-flicker);
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0;
  }
}

// ── Spawn ──
let spawnTimer = 0, pickupTimer = 0, colorCounter = 0;

function spawnObstacle() {
  const li = Math.floor(Math.random() * T_LANES.length);
  const oncoming = Math.random() < 0.14;
  state.obstacles.push({ laneX: T_LANES[li], depth:0.02, oncoming, colorIdx:colorCounter++, closeCalled:false });
}
function spawnPickup() {
  const li = Math.floor(Math.random() * T_LANES.length);
  state.pickups.push({ laneX: T_LANES[li], depth:0.02 });
}

// ── Collision ──
const COLL_DEPTH = 0.86;

function checkCollisions() {
  state.obstacles = state.obstacles.filter(ob => {
    if (ob.depth >= COLL_DEPTH && ob.depth < COLL_DEPTH+0.08) {
      const dist = Math.abs(playerX - ob.laneX);
      if (dist < COLL_TOL) {
        if (state.invincible <= 0) {
          state.hearts--; state.invincible = 90;
          spawnHitFx(ob.laneX);
          if (state.hearts <= 0) endGame(false);
        }
        return false;
      }
      if (!ob.closeCalled && dist < 0.34) {
        ob.closeCalled = true;
        showFlash("CLOSE CALL!", "#ff8800");
      }
    }
    return ob.depth < 1.12;
  });

  state.pickups = state.pickups.filter(pk => {
    if (pk.depth >= COLL_DEPTH && pk.depth < COLL_DEPTH+0.08) {
      if (Math.abs(playerX - pk.laneX) < COLL_TOL) {
        state.coins++;
        spawnPickupFx(pk.laneX);
        return false;
      }
    }
    return pk.depth < 1.12;
  });
}

function spawnHitFx(lx) {
  const p = project(COLL_DEPTH, lx);
  for (let i=0;i<12;i++) state.particles.push({x:p.x,y:p.y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:30,color:"#ff4444"});
}
function spawnPickupFx(lx) {
  const p = project(COLL_DEPTH, lx);
  for (let i=0;i<7;i++) state.particles.push({x:p.x,y:p.y-10,vx:(Math.random()-0.5)*3,vy:-Math.random()*3,life:26,color:"#ffd700"});
}

// ── Player physics ──
function updatePlayer() {
  const goLeft  = keysHeld.left  || touchHeld.left;
  const goRight = keysHeld.right || touchHeld.right;
  if (goLeft)  playerVX -= ACCEL;
  if (goRight) playerVX += ACCEL;
  playerVX *= FRICTION;
  playerVX = Math.max(-MAX_VX, Math.min(MAX_VX, playerVX));
  playerX  = Math.max(-MAX_PX, Math.min(MAX_PX, playerX + playerVX));
  const targetLean = playerVX * 20;
  leanAngle += (targetLean - leanAngle) * 0.10;
}

function depthRate() { return state.speed / 700; }

// ── Main loop ──
let raf;

function update() {
  if (!state.running || state.paused) return;
  if (state.frame===1) localStorage.setItem("sp_midgame", JSON.stringify({game:"chase"}));

  state.frame++;
  state.distance += state.speed * 0.35;
  state.speed = Math.min(12, 3.5 + state.distance/600);
  if (state.boosting>0) { state.speed = Math.min(16, state.speed+4); state.boosting--; }
  if (state.invincible>0) state.invincible--;

  updatePlayer();

  [1000,2000,3000,5000].forEach(ms => {
    if (Math.floor(state.distance) >= ms && !state.milestones[ms]) {
      state.milestones[ms] = true;
      showFlash("🎯 " + ms + "m REACHED!", "#00ccff");
    }
  });

  spawnTimer++;
  const spawnRate = Math.max(28, 80 - state.distance/50);
  if (spawnTimer >= spawnRate) { spawnTimer=0; spawnObstacle(); }
  pickupTimer++;
  if (pickupTimer >= 55) { pickupTimer=0; spawnPickup(); }

  const dr = depthRate();
  state.obstacles.forEach(o => { o.depth += dr; });
  state.pickups.forEach(p   => { p.depth += dr; });

  state.gap = Math.min(100, state.gap+0.015);
  const gf = document.getElementById("gap-fill");
  state.gap > 75 ? gf.classList.add("critical") : gf.classList.remove("critical");
  if (state.gap >= 100) { endGame(false); return; }

  checkCollisions();

  if (!state.barrier && state.distance >= state.nextCheckDist) {
    state.barrier = { depth:0.05 };
  }
  if (state.barrier) {
    state.barrier.depth += dr * 0.75;
    if (state.barrier.depth >= COLL_DEPTH) {
      state.barrier = null;
      state.nextCheckDist += 1500;
      state.paused = true;
      startCheckpoint();
    }
  }

  updateHUD();
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Apply camera lean (rotate around horizon vanishing point)
  ctx.save();
  const pivY = H * HORIZ_FRAC;
  ctx.translate(W/2, pivY);
  ctx.rotate(leanAngle * 0.032);
  ctx.translate(-W/2, -pivY);

  drawSky();
  drawRoad();
  drawBarrier();
  drawPickups();
  drawObstacles();
  drawParticles();

  ctx.restore();

  // Cockpit drawn after lean restore so it naturally tilts via its own leanAngle
  drawCockpit();
}

function loop() { update(); draw(); raf = requestAnimationFrame(loop); }

// ── Checkpoint system ──
const CP_TIMER_SECS = 8;
let cpQuestions, cpIndex, cpCorrect, cpTimerInterval;

function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function startCheckpoint() {
  cpQuestions = shuffle(CP_QUESTIONS).slice(0,3);
  cpIndex = 0; cpCorrect = 0;
  document.getElementById("cp-overlay").classList.add("show");
  loadCPQuestion();
}

function loadCPQuestion() {
  if (cpIndex >= cpQuestions.length) { finishCheckpoint(); return; }
  const q = cpQuestions[cpIndex];
  document.getElementById("cp-prog").textContent = "QUESTION " + (cpIndex+1) + " / 3";
  document.getElementById("cp-question").textContent = q.q;
  document.getElementById("cp-result").className = "cp-result";
  document.getElementById("cp-result").textContent = "";
  const aDiv = document.getElementById("cp-answers");
  aDiv.innerHTML = "";
  q.opts.forEach((opt,i) => {
    const btn = document.createElement("button");
    btn.className="cp-ans"; btn.textContent=opt; btn.id="cpa-"+i;
    btn.onclick = () => cpAnswer(i);
    aDiv.appendChild(btn);
  });
  clearInterval(cpTimerInterval);
  let secs = CP_TIMER_SECS;
  const fill = document.getElementById("cp-timer");
  fill.style.width = "100%";
  cpTimerInterval = setInterval(()=>{
    secs--;
    fill.style.width = (secs/CP_TIMER_SECS*100) + "%";
    if (secs<=0) { clearInterval(cpTimerInterval); cpAnswer(-1); }
  }, 1000);
}

function cpAnswer(idx) {
  clearInterval(cpTimerInterval);
  const q = cpQuestions[cpIndex];
  document.querySelectorAll(".cp-ans").forEach(b=>b.disabled=true);
  const res = document.getElementById("cp-result");
  if (idx === q.ans) {
    if (idx>=0) document.getElementById("cpa-"+idx).classList.add("cp-correct");
    cpCorrect++;
    res.className="cp-result good"; res.textContent="✓ Correct!";
  } else {
    if (idx>=0) document.getElementById("cpa-"+idx).classList.add("cp-wrong");
    document.getElementById("cpa-"+q.ans).classList.add("cp-correct");
    res.className="cp-result bad"; res.textContent="✗ Wrong.";
  }
  cpIndex++;
  setTimeout(loadCPQuestion, 900);
}

function finishCheckpoint() {
  clearInterval(cpTimerInterval);
  document.getElementById("cp-overlay").classList.remove("show");
  if (cpCorrect===3)      { state.boosting=210; state.gap=Math.max(0,state.gap-20); showFlash("PERFECT! SPEED BOOST! 🔥","#00ff80"); }
  else if (cpCorrect===2) { state.gap=Math.max(0,state.gap-12); showFlash("Good! Gap reduced.","#00ccff"); }
  else if (cpCorrect===1) { state.gap=Math.max(0,state.gap-5);  showFlash("1 correct. Keep pushing.","#ffcc00"); }
  else                    { state.gap=Math.min(100,state.gap+15); showFlash("All wrong! Opponent surges!","#ff4444"); }
  state.paused = false;
}

// ── Flash message ──
function showFlash(msg, color) {
  const div = document.createElement("div");
  div.textContent = msg;
  div.style.cssText = `
    position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);
    z-index:15;padding:10px 20px;background:rgba(0,0,0,0.82);
    border:1px solid ${color};border-radius:10px;
    color:${color};font-size:12px;letter-spacing:1.5px;font-weight:800;
    text-align:center;pointer-events:none;
    animation:fadeOut 1.6s forwards;
  `;
  document.getElementById("game-wrap").appendChild(div);
  setTimeout(()=>div.remove(), 1700);
}

const _s = document.createElement("style");
_s.textContent = "@keyframes fadeOut{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}70%{opacity:1}100%{opacity:0;transform:translate(-50%,-60%) scale(0.95)}}";
document.head.appendChild(_s);

// ── End game ──
function endGame(win) {
  state.running = false;
  cancelAnimationFrame(raf);
  localStorage.removeItem("sp_midgame");
  const ps = getPlayerState();
  const coins = win ? 200 : Math.min(50, state.coins*5);
  const xp    = win ? 100 : 30;
  ps.coins += coins; ps.xp += xp;
  ps.chaseDone = (ps.chaseDone||0)+1;
  if (state.distance > (ps.highestDistance||0)) ps.highestDistance = Math.floor(state.distance);
  if (win && ps.xp >= ps.level*200) { ps.xp -= ps.level*200; ps.level++; }
  savePlayerState(ps);
  const title = document.getElementById("end-title");
  const sub   = document.getElementById("end-sub");
  const rews  = document.getElementById("end-rewards");
  if (win) {
    title.textContent="MISSION COMPLETE"; title.className="end-title win";
    sub.textContent="You stopped the ShadowPhish operative! Encrypted drive recovered.";
  } else {
    title.textContent="MISSION FAILED"; title.className="end-title lose";
    sub.textContent = state.gap>=100
      ? "The operative escaped with the data. Regroup and try again."
      : "Your vehicle was disabled. The chase is over for now.";
  }
  const ps2 = getPlayerState();
  const bestDist = ps2.highestDistance||0;
  const isNewBest = Math.floor(state.distance) >= bestDist && state.distance > 0;
  rews.textContent = "+"+coins+" coins  •  "+Math.floor(state.distance)+"m" +
    (isNewBest?" 🏆 NEW BEST!":"  (best: "+bestDist+"m)")+"  •  +"+xp+" XP";
  document.getElementById("end-overlay").classList.add("show");
}

// ── Start ──
function startGame() {
  const ps = getPlayerState();
  if (!ps || ps.hearts <= 0) {
    document.getElementById("end-title").textContent="OUT OF HEARTS";
    document.getElementById("end-title").className="end-title lose";
    document.getElementById("end-sub").textContent="Hearts regenerate 1 every 30 minutes. Come back soon!";
    document.getElementById("end-rewards").textContent="";
    document.getElementById("end-overlay").classList.add("show");
    return;
  }
  state.hearts = Math.min(3, ps.hearts);
  updateHUD();
  state.running = true;
  loop();
}

resizeCanvas();
startGame();
