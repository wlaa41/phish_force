<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Highway Chase — Ride fast, collect coins, and answer cybersecurity checkpoints in ShadowPhish.">
<title>ShadowPhish — Highway Chase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Rajdhani:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Orbitron',sans-serif; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; }

#game-wrap { position:relative; width:100vw; height:100vh; }
canvas { display:block; width:100%; height:100%; }

/* ── HUD ── */
.hud {
  position:absolute; top:0; left:0; right:0;
  display:flex; justify-content:space-between; align-items:flex-start;
  padding:14px 20px;
  pointer-events:none; z-index:10;
}
.hud-block {
  background:rgba(0,0,0,0.65);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:10px; padding:8px 14px;
  font-size:10px; color:#888; letter-spacing:1.5px;
  backdrop-filter:blur(8px);
}
.hud-val { font-size:17px; font-weight:800; color:#fff; }
.hud-val.dist   { color:#00ccff; text-shadow:0 0 10px rgba(0,200,255,0.5); }
.hud-val.coins  { color:#ffd700; text-shadow:0 0 10px rgba(255,215,0,0.5); }
.hud-val.hearts { color:#ff4466; text-shadow:0 0 10px rgba(255,68,102,0.5); }

/* Gap bar */
.gap-bar-wrap {
  position:absolute; bottom:18px; left:20px; right:20px;
  pointer-events:none; z-index:10;
}
.gap-label {
  font-size:9px; color:#666; letter-spacing:2px;
  display:flex; justify-content:space-between; margin-bottom:5px;
}
.gap-track { height:7px; background:rgba(255,255,255,0.08); border-radius:4px; overflow:hidden; }
.gap-fill {
  height:100%;
  background:linear-gradient(90deg,#00ff80,#ffcc00,#ff4444);
  border-radius:4px; transition:width 0.3s, box-shadow 0.3s;
}
.gap-fill.critical { box-shadow:0 0 12px #ff4444; animation:gapPulse 0.5s infinite alternate; }
@keyframes gapPulse { from{opacity:1} to{opacity:0.55} }

/* ── CHECKPOINT OVERLAY ── */
.checkpoint-overlay {
  position:absolute; inset:0;
  background:rgba(0,0,0,0.88);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  gap:14px; backdrop-filter:blur(10px); z-index:20;
}
.checkpoint-overlay.show { display:flex; }
.cp-header {
  font-size:18px; font-weight:800; letter-spacing:4px;
  color:#ffcc00; text-shadow:0 0 28px #ffcc00;
}
.cp-sub { font-size:11px; color:#666; letter-spacing:2px; }
.cp-timer-bar {
  width:min(420px,88vw); height:5px;
  background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden;
}
.cp-timer-fill {
  height:100%; width:100%;
  background:linear-gradient(90deg,#7a00ff,#ff00cc);
  border-radius:4px; transition:width 0.1s linear;
}
.cp-progress { font-size:11px; color:#444; letter-spacing:2px; }
.cp-question {
  font-size:15px; color:#eee; text-align:center;
  max-width:min(500px,90vw); line-height:1.65;
  font-family:'Rajdhani',sans-serif; font-weight:700;
}
.cp-answers {
  display:grid; grid-template-columns:1fr 1fr;
  gap:10px; width:min(500px,90vw);
}
.cp-ans {
  padding:13px 15px;
  border:1.5px solid rgba(255,255,255,0.12); border-radius:10px;
  background:rgba(255,255,255,0.05); color:#bbb;
  font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700;
  cursor:pointer; text-align:left; transition:0.2s; line-height:1.45;
}
.cp-ans:hover:not(:disabled) { background:rgba(179,0,255,0.2); border-color:rgba(179,0,255,0.5); color:#fff; }
.cp-ans.cp-correct { background:rgba(0,255,128,0.15); border-color:#00ff80; color:#00ff80; }
.cp-ans.cp-wrong   { background:rgba(255,50,50,0.15);  border-color:#ff3333; color:#ff3333; }
.cp-ans:disabled   { cursor:default; }
.cp-result { font-size:12px; color:#666; text-align:center; min-height:22px; font-family:'Rajdhani',sans-serif; }
.cp-result.good { color:#00ff80; }
.cp-result.bad  { color:#ff4466; }

/* ── END OVERLAY ── */
.end-overlay {
  position:absolute; inset:0; z-index:30;
  background:rgba(0,0,0,0.92);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  gap:14px; backdrop-filter:blur(10px);
}
.end-overlay.show { display:flex; }
.end-card {
  padding:32px 42px; border-radius:18px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  text-align:center; min-width:min(340px,90vw);
  box-shadow:0 0 60px rgba(140,0,255,0.35);
}
.end-title { font-size:22px; font-weight:800; letter-spacing:4px; margin-bottom:10px; }
.end-title.win  { color:#00ff80; text-shadow:0 0 20px #00ff80; }
.end-title.lose { color:#ff4444; text-shadow:0 0 20px #ff4444; }
.end-sub     { font-size:12px; color:#777; line-height:1.6; margin-bottom:12px; }
.end-rewards { font-size:13px; color:#ffd700; font-weight:800; margin-bottom:18px; }
.end-btn-row { display:flex; gap:10px; justify-content:center; }
.end-btn {
  padding:11px 22px; border-radius:8px; border:none;
  font-family:'Orbitron',sans-serif; font-size:10px; font-weight:800; letter-spacing:2px;
  cursor:pointer; transition:0.2s;
}
.end-btn.primary   { background:linear-gradient(90deg,#7a00ff,#ff00cc); color:#fff; }
.end-btn.primary:hover { transform:scale(1.05); }
.end-btn.secondary { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:#aaa; }

/* back link */
.back-link {
  position:absolute; top:16px; left:20px;
  font-size:10px; color:#555; letter-spacing:2px;
  text-decoration:none; z-index:15; pointer-events:all;
}
.back-link:hover { color:#b300ff; }

/* mobile controls */
#mobile-controls {
  position:absolute; bottom:60px; left:50%; transform:translateX(-50%);
  display:flex; gap:22px; z-index:10; pointer-events:all;
}
.mob-btn {
  width:64px; height:64px; border-radius:50%;
  background:rgba(0,0,0,0.7);
  display:flex; align-items:center; justify-content:center;
  font-size:26px; cursor:pointer; user-select:none; -webkit-user-select:none;
}
.mob-btn.left  { border:1.5px solid rgba(179,0,255,0.5); color:#b300ff; box-shadow:0 0 14px rgba(179,0,255,0.3); }
.mob-btn.right { border:1.5px solid rgba(0,200,255,0.5); color:#00ccff; box-shadow:0 0 14px rgba(0,200,255,0.3); }
</style>
</head>
<body>
<div id="game-wrap">
  <canvas id="canvas"></canvas>

  <a class="back-link" href="home.html">← HQ</a>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-block">
      <div>DISTANCE</div>
      <div class="hud-val dist"><span id="hud-dist">0</span>m</div>
    </div>
    <div class="hud-block">
      <div>COINS</div>
      <div class="hud-val coins">◈ <span id="hud-coins">0</span></div>
    </div>
    <div class="hud-block">
      <div>LIVES</div>
      <div class="hud-val hearts"><span id="hud-hearts">♥♥♥</span></div>
    </div>
  </div>

  <!-- Gap bar -->
  <div class="gap-bar-wrap">
    <div class="gap-label">
      <span>YOU</span><span>SHADOWPHISH GAP</span><span>ESCAPED</span>
    </div>
    <div class="gap-track">
      <div class="gap-fill" id="gap-fill" style="width:30%"></div>
    </div>
  </div>

  <!-- CHECKPOINT OVERLAY -->
  <div class="checkpoint-overlay" id="cp-overlay">
    <div class="cp-header">⚡ QUESTION ZONE</div>
    <div class="cp-sub">3/3 CORRECT = SPEED BOOST &nbsp;|&nbsp; ANSWER TO CLOSE THE GAP</div>
    <div class="cp-timer-bar"><div class="cp-timer-fill" id="cp-timer"></div></div>
    <div class="cp-progress" id="cp-prog">QUESTION 1 / 3</div>
    <div class="cp-question" id="cp-question"></div>
    <div class="cp-answers" id="cp-answers"></div>
    <div class="cp-result" id="cp-result"></div>
  </div>

  <!-- MOBILE CONTROLS -->
  <div id="mobile-controls">
    <div class="mob-btn left"  ontouchstart="mobileMove(-1)" onclick="mobileMove(-1)">◀</div>
    <div class="mob-btn right" ontouchstart="mobileMove(1)"  onclick="mobileMove(1)">▶</div>
  </div>

  <!-- END OVERLAY -->
  <div class="end-overlay" id="end-overlay">
    <div class="end-card">
      <div class="end-title" id="end-title">MISSION COMPLETE</div>
      <div class="end-sub"     id="end-sub"></div>
      <div class="end-rewards" id="end-rewards"></div>
      <div class="end-btn-row">
        <button class="end-btn primary"   onclick="window.location.href='chase.html'">PLAY AGAIN</button>
        <button class="end-btn secondary" onclick="window.location.href='home.html'">HOME</button>
      </div>
    </div>
  </div>
</div>

<script>
// ────────────────── CHECKPOINT QUESTIONS ──────────────────
const CP_QUESTIONS = [
  { q:"Which is a sign of a phishing email?",
    opts:["Urgent call to action + suspicious sender domain","Formal greeting and company logo","Reply-to matches sender","Email contains no links"],
    ans:0 },
  { q:"What does 'smishing' refer to?",
    opts:["Phishing via SMS text messages","Phishing via email","Phishing via voice calls","Phishing via social media"],
    ans:0 },
  { q:"A URL showing 'paypa1.com' instead of 'paypal.com' is an example of:",
    opts:["Typosquatting","Pharming","Spoofing","Vishing"],
    ans:0 },
  { q:"What should you do when you receive an urgent payment request from your 'CEO' by email only?",
    opts:["Call the CEO directly to verify","Process it — it's urgent","Reply to the email to confirm","Forward to your team"],
    ans:0 },
  { q:"Multi-Factor Authentication (MFA) protects your account by:",
    opts:["Requiring a second form of verification beyond just a password","Encrypting your password","Hiding your email address","Blocking all unknown senders"],
    ans:0 },
  { q:"Which domain is legitimate for a government website?",
    opts:["gov.example.gov","example-gov.com","example.gov.support.net","gov-example-official.com"],
    ans:0 },
  { q:"A pop-up says 'Call Microsoft Support at 1-800-XXX' to fix a virus. You should:",
    opts:["Close the browser — this is a tech support scam","Call the number immediately","Download the offered tool","Enter your email for a free scan"],
    ans:0 },
  { q:"Spear phishing differs from regular phishing because it is:",
    opts:["Targeted at a specific person using personal information","Sent to millions of people","Delivered via SMS","Conducted over the phone"],
    ans:0 },
  { q:"Before clicking a link in an email, you should:",
    opts:["Hover over it to check the real URL","Click it to see where it goes","Copy it and search Google","Ask a colleague to click it first"],
    ans:0 },
  { q:"Which action best protects you from credential theft?",
    opts:["Using a unique strong password + MFA on every account","Using the same password everywhere for easy recall","Changing your password every day","Writing it on paper and keeping it at your desk"],
    ans:0 },
  { q:"What does a padlock icon in the browser address bar guarantee?",
    opts:["The connection is encrypted — but NOT that the site is safe","The site is completely safe to use","The site is verified by the government","Your payment details are protected"],
    ans:0 },
  { q:"A stranger on social media asks for your date of birth to 'verify your identity'. You should:",
    opts:["Refuse — this is a social engineering attempt to harvest personal data","Share it — it is public information","Share just the year, not the full date","Ask them to verify themselves first"],
    ans:0 },
  { q:"A website URL starts with 'http://' instead of 'https://'. This means:",
    opts:["The connection is unencrypted — your data could be intercepted","The site is definitely a phishing page","The site is faster to load","The site is safe for shopping"],
    ans:0 },
  { q:"What is 'whaling' in cybersecurity?",
    opts:["Targeted phishing attacks aimed at senior executives (CEO, CFO)","Phishing attacks on fishing industry websites","Mass email phishing targeting millions","Attacks via WhatsApp messages"],
    ans:0 },
  { q:"What is 'vishing'?",
    opts:["Voice call phishing — scammers call pretending to be trusted organisations","A type of malware","Phishing via video","Phishing via email"],
    ans:0 },
  { q:"An email urges you to 'ACT NOW or your account is closed'. This urgency is a sign of:",
    opts:["Social engineering — designed to prevent you from thinking clearly","Legitimate security measure","Automated notification","Password reset reminder"],
    ans:0 },
];

// ────────────────── CANVAS & PERSPECTIVE ──────────────────
const canvas = document.getElementById("canvas");
const ctx    = canvas.getContext("2d");
let W, H;

function resizeCanvas() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  precomputeStars();
}
window.addEventListener("resize", () => { resizeCanvas(); });

// Perspective constants
const HORIZ_FRAC  = 0.40;   // horizon at 40% from top
const ROAD_NEAR_W = 0.88;   // road width fraction at bottom of screen
const ROAD_FAR_W  = 28;     // road width in px at horizon

// Lane center positions as fraction of road half-width (-1 to 1)
const LANE_FX = [-0.58, 0, 0.58];

// Project a road object to screen
// depth  : 0 = at horizon (far), 1 = at player (near, bottom)
// lanePos: -1 = left edge, 0 = center, 1 = right edge
function project(depth, lanePos) {
  const hy = H * HORIZ_FRAC;
  const sy = hy + (H - hy) * depth;
  const rw = ROAD_FAR_W + (W * ROAD_NEAR_W - ROAD_FAR_W) * depth;
  const sx = W/2 + lanePos * rw / 2;
  return { x: sx, y: sy, scale: Math.max(0.04, depth), rw };
}

// ────────────────── STARS ──────────────────
let STARS = [];
function precomputeStars() {
  STARS = [];
  const rng = seededRng(77);
  for (let i = 0; i < 160; i++) {
    STARS.push({
      x: rng() * W,
      y: rng() * H * HORIZ_FRAC * 0.95,
      r: rng() * 1.4 + 0.2,
      a: rng() * 0.7 + 0.15,
    });
  }
}
function seededRng(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
}

// ────────────────── GAME STATE ──────────────────
let state = {
  running:false, paused:false,
  distance:0, speed:3.5,
  coins:0, hearts:3,
  gap:30,
  playerLane:1, targetLane:1, playerXOff:0, targetXOff:0,
  frame:0, dashPhase:0,
  obstacles:[], pickups:[], particles:[],
  invincible:0, boosting:0,
  barrier:null,          // { depth } — checkpoint barrier
  nextCheckDist:1500,
  milestones:{},
};

// ────────────────── STATE HELPERS ──────────────────
function getPlayerState() {
  return JSON.parse(localStorage.getItem("sp_state")) || {
    coins:50, hintTokens:3, hearts:5, maxHearts:5,
    lastHeartTime:Date.now(), xp:0, level:1, intelDone:0, chaseDone:0,
    highestDistance:0, longestStreak:0
  };
}
function savePlayerState(s) { localStorage.setItem("sp_state", JSON.stringify(s)); }

function lerp(a, b, t) { return a + (b - a) * t; }

function updateHUD() {
  document.getElementById("hud-dist").textContent   = Math.floor(state.distance);
  document.getElementById("hud-coins").textContent  = state.coins;
  document.getElementById("hud-hearts").textContent = "♥".repeat(Math.max(0, state.hearts));
  document.getElementById("gap-fill").style.width   = state.gap + "%";
}

// ────────────────── DRAW SKY ──────────────────
function drawSky() {
  const hy = H * HORIZ_FRAC;

  // Sky gradient
  const g = ctx.createLinearGradient(0, 0, 0, hy);
  g.addColorStop(0, "#020010");
  g.addColorStop(0.55, "#0c0028");
  g.addColorStop(1, "#1e0045");
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, hy);

  // Stars
  STARS.forEach(s => {
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(200,220,255,${s.a})`; ctx.fill();
  });

  // Horizon glow
  const hg = ctx.createLinearGradient(0, hy - 40, 0, hy + 20);
  hg.addColorStop(0, "rgba(0,50,120,0)");
  hg.addColorStop(0.6, "rgba(0,120,255,0.22)");
  hg.addColorStop(1, "rgba(0,220,255,0.08)");
  ctx.fillStyle = hg; ctx.fillRect(0, hy - 40, W, 60);

  // Distant purple mountains silhouette
  ctx.fillStyle = "rgba(30,0,60,0.7)";
  ctx.beginPath(); ctx.moveTo(0, hy);
  for (let x = 0; x <= W; x += 30) {
    const peak = hy - 20 - Math.abs(Math.sin(x * 0.012 + 1.3)) * 48
                      - Math.abs(Math.sin(x * 0.031 + 2.7)) * 28;
    ctx.lineTo(x, peak);
  }
  ctx.lineTo(W, hy); ctx.closePath(); ctx.fill();
}

// ────────────────── DRAW ROAD ──────────────────
function drawRoad() {
  const hy = H * HORIZ_FRAC;
  const vpx = W / 2;
  const rl_far = vpx - ROAD_FAR_W / 2, rr_far = vpx + ROAD_FAR_W / 2;
  const rl_near = vpx - W * ROAD_NEAR_W / 2, rr_near = vpx + W * ROAD_NEAR_W / 2;

  // Desert shoulders
  const dirt = ctx.createLinearGradient(0, hy, 0, H);
  dirt.addColorStop(0, "#1e1208"); dirt.addColorStop(1, "#0e0904");
  ctx.fillStyle = dirt;
  // Left shoulder
  ctx.beginPath(); ctx.moveTo(0, H); ctx.lineTo(rl_near, H);
  ctx.lineTo(rl_far, hy); ctx.lineTo(0, hy); ctx.closePath(); ctx.fill();
  // Right shoulder
  ctx.beginPath(); ctx.moveTo(rr_near, H); ctx.lineTo(W, H);
  ctx.lineTo(W, hy); ctx.lineTo(rr_far, hy); ctx.closePath(); ctx.fill();

  // Road strips (far→near, slight alternating shading for depth)
  const STRIPS = 16;
  for (let i = 0; i < STRIPS; i++) {
    const t0 = i / STRIPS, t1 = (i + 1) / STRIPS;
    const y0 = hy + (H - hy) * t0, y1 = hy + (H - hy) * t1;
    const xl0 = lerp(rl_far, rl_near, t0), xr0 = lerp(rr_far, rr_near, t0);
    const xl1 = lerp(rl_far, rl_near, t1), xr1 = lerp(rr_far, rr_near, t1);
    const lum = 13 + (i % 2) * 3 + Math.floor(i * 0.8);
    ctx.fillStyle = `rgb(${lum},${lum},${lum + 5})`;
    ctx.beginPath();
    ctx.moveTo(xl0, y0); ctx.lineTo(xr0, y0);
    ctx.lineTo(xr1, y1); ctx.lineTo(xl1, y1);
    ctx.closePath(); ctx.fill();
  }

  // Neon edge lines
  ctx.lineWidth = 2.5; ctx.shadowBlur = 10; ctx.shadowColor = "#00ff80";
  ctx.strokeStyle = "rgba(0,255,80,0.65)";
  ctx.beginPath(); ctx.moveTo(rl_far, hy); ctx.lineTo(rl_near, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rr_far, hy); ctx.lineTo(rr_near, H); ctx.stroke();
  ctx.shadowBlur = 0;

  // Dashed lane markings (animated, perspective-correct)
  state.dashPhase = (state.dashPhase + state.speed * 0.018) % 1;
  const DASHES = 12;
  for (let lane = 1; lane <= 2; lane++) {
    const frac = lane / 3;
    for (let d = 0; d < DASHES; d++) {
      let t0 = ((d + state.dashPhase) / DASHES) % 1;
      let t1 = ((d + 0.42 + state.dashPhase) / DASHES) % 1;
      if (t0 > t1) continue;
      const y0 = hy + (H - hy) * t0, y1 = hy + (H - hy) * t1;
      const rw0 = ROAD_FAR_W + (W * ROAD_NEAR_W - ROAD_FAR_W) * t0;
      const rw1 = ROAD_FAR_W + (W * ROAD_NEAR_W - ROAD_FAR_W) * t1;
      const x0 = vpx - rw0 / 2 + rw0 * frac;
      const x1 = vpx - rw1 / 2 + rw1 * frac;
      const alpha = 0.15 + 0.2 * t0;
      ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
      ctx.lineWidth = 1.5 * t0 + 0.5;
      ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
    }
  }
}

// ────────────────── DRAW BARRIER (checkpoint) ──────────────────
function drawBarrier() {
  if (!state.barrier) return;
  const d = state.barrier.depth;

  const p_l  = project(d, -1);
  const p_r  = project(d,  1);
  const barW  = p_r.x - p_l.x;
  const barH  = Math.max(4, 28 * d);
  const bx    = p_l.x, by = p_l.y - barH / 2;

  const pulse = 0.75 + 0.25 * Math.sin(state.frame * 0.22);

  // Glow behind
  ctx.save();
  ctx.shadowBlur = 24 * d; ctx.shadowColor = "#ff6600";
  ctx.globalAlpha = pulse * Math.min(1, d * 2.5);

  // Caution stripes (orange / black alternating)
  const STRIPE_W = Math.max(18, barW / 10);
  ctx.save();
  ctx.beginPath(); ctx.rect(bx, by, barW, barH); ctx.clip();
  for (let i = -2; i < barW / STRIPE_W + 2; i++) {
    ctx.fillStyle = i % 2 === 0 ? "#ff6600" : "#111";
    ctx.beginPath();
    ctx.moveTo(bx + i * STRIPE_W,           by);
    ctx.lineTo(bx + i * STRIPE_W + STRIPE_W, by);
    ctx.lineTo(bx + i * STRIPE_W + STRIPE_W - barH * 0.7, by + barH);
    ctx.lineTo(bx + i * STRIPE_W           - barH * 0.7, by + barH);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();

  // Top/bottom border lines
  ctx.strokeStyle = "#ff8800"; ctx.lineWidth = 2;
  ctx.strokeRect(bx, by, barW, barH);

  // CHECKPOINT label
  if (d > 0.25) {
    ctx.shadowBlur = 14; ctx.shadowColor = "#ffcc00";
    ctx.fillStyle = "#ffcc00";
    ctx.font = `bold ${Math.floor(13 * d)}px Orbitron, sans-serif`;
    ctx.textAlign = "center";
    ctx.fillText("⚡ CHECKPOINT", W / 2, by - 8);
  }
  ctx.globalAlpha = 1; ctx.restore();
}

// ────────────────── DRAW OBSTACLES ──────────────────
const CAR_COLORS  = ["#cc2244","#224499","#228844","#886600","#882288"];
const CAR_GLOWS   = ["#ff3355","#3366ff","#33cc66","#ccaa00","#cc44ff"];
let carColorSeeds = [];

function drawObstacles() {
  // Sort furthest first so nearer ones draw on top
  const sorted = [...state.obstacles].sort((a,b) => a.depth - b.depth);
  sorted.forEach(ob => {
    const lx  = LANE_FX[ob.lane];
    const p   = project(ob.depth, lx);
    if (p.y < H * HORIZ_FRAC) return;
    const ci  = ob.colorIdx % CAR_COLORS.length;
    drawPerspCar(p, CAR_COLORS[ci], CAR_GLOWS[ci]);
  });
}

function drawPerspCar(p, bodyColor, glowColor) {
  const cw = 72 * p.scale, ch = 110 * p.scale;
  ctx.save();
  ctx.shadowBlur = 10 * p.scale; ctx.shadowColor = glowColor;

  // Body
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.roundRect(p.x - cw/2, p.y - ch, cw, ch, 5 * p.scale);
  ctx.fill();

  // Roof highlight
  ctx.fillStyle = "rgba(255,255,255,0.08)";
  ctx.beginPath();
  ctx.roundRect(p.x - cw/2 + cw*0.15, p.y - ch + ch*0.12, cw*0.70, ch*0.30, 3 * p.scale);
  ctx.fill();

  // Windshield
  ctx.fillStyle = "rgba(0,180,255,0.18)";
  ctx.fillRect(p.x - cw/2 + cw*0.12, p.y - ch + ch*0.12, cw*0.76, ch*0.25);

  // Taillights (we see the back — taillights at bottom of car)
  ctx.shadowColor = "#ff2222"; ctx.shadowBlur = 8 * p.scale; ctx.fillStyle = "#ff3333";
  ctx.fillRect(p.x - cw/2 + cw*0.08, p.y - ch*0.09, cw*0.18, ch*0.07);
  ctx.fillRect(p.x + cw/2 - cw*0.26, p.y - ch*0.09, cw*0.18, ch*0.07);

  ctx.shadowBlur = 0; ctx.restore();
}

// ────────────────── DRAW PICKUPS (coins) ──────────────────
function drawPickups() {
  const sorted = [...state.pickups].sort((a,b) => a.depth - b.depth);
  sorted.forEach(pk => {
    const lx = LANE_FX[pk.lane];
    const p  = project(pk.depth, lx);
    if (p.y < H * HORIZ_FRAC) return;
    const r  = Math.max(5, 14 * p.scale);
    ctx.save();
    ctx.shadowBlur = 16 * p.scale; ctx.shadowColor = "#ffd700";
    ctx.fillStyle = "#ffd700";
    ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.fill();
    if (r > 8) {
      ctx.fillStyle = "#fff";
      ctx.font = `bold ${Math.floor(r * 1.1)}px sans-serif`;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("◈", p.x, p.y);
    }
    ctx.restore();
  });
}

// ────────────────── DRAW PLAYER BIKE ──────────────────
function drawPlayerBike() {
  // Player lane x at near depth (perspective position)
  const laneP = project(0.92, LANE_FX[state.playerLane]);
  const cx = lerp(W/2, laneP.x, 0.55);  // shift toward lane
  const cy = H - 70;

  const glowColor = state.boosting > 0 ? "#00ff80" : "#2277ff";
  const bodyColor = state.boosting > 0 ? "#00cc66" : "#1144cc";

  // Invincible flash
  if (state.invincible > 0 && state.frame % 6 < 3) return;

  ctx.save();

  // ── REAR WHEEL ──
  ctx.shadowBlur = 14; ctx.shadowColor = glowColor;
  ctx.fillStyle = "#111";
  ctx.beginPath(); ctx.ellipse(cx, cy + 26, 32, 16, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,0.15)"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(cx, cy + 26, 29, 13, 0, 0, Math.PI*2); ctx.stroke();
  // Tire tread line
  ctx.strokeStyle = "rgba(255,255,255,0.08)"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.ellipse(cx, cy + 26, 20, 9, 0, 0, Math.PI*2); ctx.stroke();

  // ── BIKE BODY / FAIRING ──
  ctx.shadowBlur = 20; ctx.shadowColor = glowColor;
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.roundRect(cx - 22, cy - 52, 44, 68, 10);
  ctx.fill();

  // Body highlight
  ctx.fillStyle = "rgba(255,255,255,0.12)";
  ctx.beginPath(); ctx.roundRect(cx - 14, cy - 48, 28, 32, 6); ctx.fill();

  // ── FUEL TANK ──
  ctx.fillStyle = state.boosting > 0 ? "rgba(0,255,128,0.4)" : "rgba(0,160,255,0.35)";
  ctx.beginPath(); ctx.ellipse(cx, cy - 28, 12, 8, 0, 0, Math.PI*2); ctx.fill();

  // ── RIDER BODY ──
  ctx.shadowBlur = 0;
  ctx.fillStyle = "#cc2244";
  ctx.beginPath();
  ctx.roundRect(cx - 16, cy - 75, 32, 28, 8);
  ctx.fill();

  // ── HELMET ──
  ctx.shadowBlur = 10; ctx.shadowColor = glowColor;
  ctx.fillStyle = "#111";
  ctx.beginPath(); ctx.arc(cx, cy - 84, 16, 0, Math.PI*2); ctx.fill();
  // visor
  ctx.fillStyle = glowColor; ctx.globalAlpha = 0.6;
  ctx.beginPath(); ctx.ellipse(cx, cy - 84, 11, 6, 0, 0.1 * Math.PI, 0.9 * Math.PI); ctx.fill();
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;

  // ── HANDLEBARS ──
  ctx.strokeStyle = "#777"; ctx.lineWidth = 5; ctx.lineCap = "round";
  // Left handlebar
  ctx.beginPath();
  ctx.moveTo(cx - 22, cy - 48);
  ctx.quadraticCurveTo(cx - 40, cy - 44, cx - 72, cy - 36);
  ctx.stroke();
  // Right handlebar
  ctx.beginPath();
  ctx.moveTo(cx + 22, cy - 48);
  ctx.quadraticCurveTo(cx + 40, cy - 44, cx + 72, cy - 36);
  ctx.stroke();

  // Mirror left
  ctx.fillStyle = "#555";
  ctx.fillRect(cx - 78, cy - 41, 10, 6);
  // Mirror right
  ctx.fillRect(cx + 68, cy - 41, 10, 6);

  // ── EXHAUST FLAME (boost) ──
  if (state.boosting > 0) {
    const flicker = Math.random() * 10;
    const grad = ctx.createLinearGradient(cx, cy + 36, cx, cy + 62 + flicker);
    grad.addColorStop(0, "rgba(255,200,0,0.95)");
    grad.addColorStop(0.5, "rgba(255,80,0,0.7)");
    grad.addColorStop(1, "rgba(255,0,0,0)");
    ctx.shadowBlur = 20; ctx.shadowColor = "#ff6600";
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(cx - 7, cy + 36); ctx.lineTo(cx + 7, cy + 36);
    ctx.lineTo(cx + 3, cy + 62 + flicker); ctx.lineTo(cx - 3, cy + 62 + flicker);
    ctx.closePath(); ctx.fill();
  }

  ctx.shadowBlur = 0; ctx.restore();
}

// ────────────────── DRAW PARTICLES ──────────────────
function drawParticles() {
  state.particles = state.particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.life--;
    const a = p.life / 30;
    ctx.beginPath(); ctx.arc(p.x, p.y, 3 * a, 0, Math.PI*2);
    ctx.fillStyle = p.color + Math.floor(a * 255).toString(16).padStart(2, "0");
    ctx.fill();
    return p.life > 0;
  });
}

// ────────────────── SPAWN ──────────────────
let spawnTimer = 0, pickupTimer = 0, colorCounter = 0;

function spawnObstacle() {
  const lane = Math.floor(Math.random() * 3);
  state.obstacles.push({ lane, depth:0.02, type: Math.random()<0.65 ? "car" : "barrier", colorIdx: colorCounter++ });
}
function spawnPickup() {
  const lane = Math.floor(Math.random() * 3);
  state.pickups.push({ lane, depth:0.02 });
}

// ────────────────── COLLISION ──────────────────
const COLL_DEPTH = 0.86;

function checkCollisions() {
  const pl = state.playerLane;

  state.obstacles = state.obstacles.filter(ob => {
    if (ob.depth >= COLL_DEPTH && ob.depth < COLL_DEPTH + 0.08 && ob.lane === pl) {
      if (state.invincible <= 0) {
        state.hearts--; state.invincible = 90;
        spawnHitParticles();
        if (state.hearts <= 0) endGame(false);
      }
      return false;
    }
    return ob.depth < 1.12;
  });

  state.pickups = state.pickups.filter(pk => {
    if (pk.depth >= COLL_DEPTH && pk.depth < COLL_DEPTH + 0.08 && pk.lane === pl) {
      state.coins++;
      spawnPickupParticle();
      return false;
    }
    return pk.depth < 1.12;
  });
}

function spawnHitParticles() {
  const p = project(COLL_DEPTH, LANE_FX[state.playerLane]);
  for (let i=0;i<10;i++) {
    state.particles.push({ x:p.x, y:p.y, vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5, life:30, color:"#ff4444" });
  }
}
function spawnPickupParticle() {
  const p = project(COLL_DEPTH, LANE_FX[state.playerLane]);
  for (let i=0;i<6;i++) {
    state.particles.push({ x:p.x, y:p.y-10, vx:(Math.random()-0.5)*3, vy:-Math.random()*3, life:25, color:"#ffd700" });
  }
}

// ────────────────── DEPTH RATE ──────────────────
// How much depth increases per frame at speed 1; scales with speed
function depthRate() { return state.speed / 700; }

// ────────────────── MAIN LOOP ──────────────────
let raf;

function update() {
  if (!state.running || state.paused) return;
  if (state.frame === 1) localStorage.setItem("sp_midgame", JSON.stringify({game:"chase"}));

  state.frame++;
  state.distance += state.speed * 0.35;
  state.speed = Math.min(12, 3.5 + state.distance / 600);
  if (state.boosting > 0) { state.speed = Math.min(16, state.speed + 4); state.boosting--; }
  if (state.invincible > 0) state.invincible--;

  // Milestones
  [1000,2000,3000,5000].forEach(ms => {
    if (Math.floor(state.distance) >= ms && !state.milestones[ms]) {
      state.milestones[ms] = true;
      showFlash("🎯 " + ms + "m REACHED!", "#00ccff");
    }
  });

  // Spawn obstacles & pickups
  spawnTimer++;
  const spawnRate = Math.max(28, 80 - state.distance / 50);
  if (spawnTimer >= spawnRate) { spawnTimer = 0; spawnObstacle(); }
  pickupTimer++;
  if (pickupTimer >= 55) { pickupTimer = 0; spawnPickup(); }

  // Advance obstacle/pickup depths
  const dr = depthRate();
  state.obstacles.forEach(o => { o.depth += dr; });
  state.pickups.forEach(p   => { p.depth += dr; });

  // Gap
  state.gap = Math.min(100, state.gap + 0.015);
  const gf = document.getElementById("gap-fill");
  state.gap > 75 ? gf.classList.add("critical") : gf.classList.remove("critical");
  if (state.gap >= 100) { endGame(false); return; }

  checkCollisions();

  // Spawn barrier when distance reaches threshold
  if (!state.barrier && state.distance >= state.nextCheckDist) {
    state.barrier = { depth: 0.05 };
  }

  // Advance barrier
  if (state.barrier) {
    state.barrier.depth += dr * 0.75;
    if (state.barrier.depth >= COLL_DEPTH) {
      state.barrier = null;
      state.nextCheckDist += 1500;
      state.paused = true;
      startCheckpoint();
    }
  }

  updateHUD();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawSky();
  drawRoad();
  drawBarrier();
  drawPickups();
  drawObstacles();
  drawParticles();
  drawPlayerBike();
}

function loop() { update(); draw(); raf = requestAnimationFrame(loop); }

// ────────────────── CHECKPOINT SYSTEM ──────────────────
const CP_TIMER_SECS = 8;
let cpQuestions, cpIndex, cpCorrect, cpTimerInterval;

function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function startCheckpoint() {
  cpQuestions = shuffle(CP_QUESTIONS).slice(0, 3);
  cpIndex = 0; cpCorrect = 0;
  document.getElementById("cp-overlay").classList.add("show");
  loadCPQuestion();
}

function loadCPQuestion() {
  if (cpIndex >= cpQuestions.length) { finishCheckpoint(); return; }
  const q = cpQuestions[cpIndex];
  document.getElementById("cp-prog").textContent = "QUESTION " + (cpIndex+1) + " / 3";
  document.getElementById("cp-question").textContent = q.q;
  document.getElementById("cp-result").className = "cp-result";
  document.getElementById("cp-result").textContent = "";

  const aDiv = document.getElementById("cp-answers");
  aDiv.innerHTML = "";
  q.opts.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "cp-ans"; btn.textContent = opt; btn.id = "cpa-"+i;
    btn.onclick = () => cpAnswer(i);
    aDiv.appendChild(btn);
  });

  clearInterval(cpTimerInterval);
  let secs = CP_TIMER_SECS;
  const fill = document.getElementById("cp-timer");
  fill.style.width = "100%";
  cpTimerInterval = setInterval(() => {
    secs--;
    fill.style.width = (secs / CP_TIMER_SECS * 100) + "%";
    if (secs <= 0) { clearInterval(cpTimerInterval); cpAnswer(-1); }
  }, 1000);
}

function cpAnswer(idx) {
  clearInterval(cpTimerInterval);
  const q = cpQuestions[cpIndex];
  document.querySelectorAll(".cp-ans").forEach(b => b.disabled = true);
  const res = document.getElementById("cp-result");
  if (idx === q.ans) {
    if (idx >= 0) document.getElementById("cpa-"+idx).classList.add("cp-correct");
    cpCorrect++;
    res.className = "cp-result good"; res.textContent = "✓ Correct!";
  } else {
    if (idx >= 0) document.getElementById("cpa-"+idx).classList.add("cp-wrong");
    document.getElementById("cpa-"+q.ans).classList.add("cp-correct");
    res.className = "cp-result bad"; res.textContent = "✗ Wrong.";
  }
  cpIndex++;
  setTimeout(loadCPQuestion, 900);
}

function finishCheckpoint() {
  clearInterval(cpTimerInterval);
  document.getElementById("cp-overlay").classList.remove("show");
  if (cpCorrect === 3) {
    state.boosting = 210;
    state.gap = Math.max(0, state.gap - 20);
    showFlash("PERFECT! SPEED BOOST! 🔥", "#00ff80");
  } else if (cpCorrect === 2) {
    state.gap = Math.max(0, state.gap - 12);
    showFlash("Good! Gap reduced.", "#00ccff");
  } else if (cpCorrect === 1) {
    state.gap = Math.max(0, state.gap - 5);
    showFlash("1 correct. Keep pushing.", "#ffcc00");
  } else {
    state.gap = Math.min(100, state.gap + 15);
    showFlash("All wrong! Opponent surges!", "#ff4444");
  }
  state.paused = false;
}

// ────────────────── FLASH MESSAGE ──────────────────
function showFlash(msg, color) {
  const div = document.createElement("div");
  div.textContent = msg;
  div.style.cssText = `
    position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);
    z-index:15;padding:10px 20px;background:rgba(0,0,0,0.8);
    border:1px solid ${color};border-radius:10px;
    color:${color};font-size:12px;letter-spacing:1.5px;font-weight:800;
    text-align:center;pointer-events:none;
    animation:fadeOut 1.6s forwards;
  `;
  document.getElementById("game-wrap").appendChild(div);
  setTimeout(() => div.remove(), 1700);
}

// ────────────────── END GAME ──────────────────
function endGame(win) {
  state.running = false;
  cancelAnimationFrame(raf);
  localStorage.removeItem("sp_midgame");

  const ps = getPlayerState();
  const coins = win ? 200 : Math.min(50, state.coins * 5);
  const xp    = win ? 100 : 30;
  ps.coins += coins; ps.xp += xp;
  ps.chaseDone = (ps.chaseDone || 0) + 1;
  if (state.distance > (ps.highestDistance || 0)) ps.highestDistance = Math.floor(state.distance);
  if (win && ps.xp >= ps.level * 200) { ps.xp -= ps.level * 200; ps.level++; }
  savePlayerState(ps);

  const title = document.getElementById("end-title");
  const sub   = document.getElementById("end-sub");
  const rews  = document.getElementById("end-rewards");

  if (win) {
    title.textContent = "MISSION COMPLETE"; title.className = "end-title win";
    sub.textContent = "You stopped the ShadowPhish operative! Encrypted drive recovered.";
  } else {
    title.textContent = "MISSION FAILED"; title.className = "end-title lose";
    sub.textContent = state.gap >= 100
      ? "The operative escaped with the data. Regroup and try again."
      : "Your vehicle was disabled. The chase is over for now.";
  }
  const ps2 = getPlayerState();
  const bestDist = ps2.highestDistance || 0;
  const isNewBest = Math.floor(state.distance) >= bestDist && state.distance > 0;
  rews.textContent = "+" + coins + " coins  •  " + Math.floor(state.distance) + "m" +
    (isNewBest ? " 🏆 NEW BEST!" : " (best: " + bestDist + "m)") + "  •  +" + xp + " XP";
  document.getElementById("end-overlay").classList.add("show");
}

// ────────────────── INPUT ──────────────────
function moveLeft()  { if(state.playerLane>0){ state.playerLane--; } }
function moveRight() { if(state.playerLane<2){ state.playerLane++; } }
function mobileMove(dir) { if(!state.running||state.paused)return; dir===-1?moveLeft():moveRight(); }

document.addEventListener("keydown", e => {
  if (!state.running || state.paused) return;
  if (e.key==="ArrowLeft" ||e.key==="a"||e.key==="A") moveLeft();
  if (e.key==="ArrowRight"||e.key==="d"||e.key==="D") moveRight();
  if ((e.key==="p"||e.key==="P") && state.running) {
    state.paused = !state.paused; if (!state.paused) loop();
  }
});

let touchStartX = 0;
canvas.addEventListener("touchstart", e => { touchStartX = e.touches[0].clientX; }, {passive:true});
canvas.addEventListener("touchend",   e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 28) { dx<0?moveLeft():moveRight(); }
}, {passive:true});

// ────────────────── FLASH ANIM ──────────────────
const st = document.createElement("style");
st.textContent = "@keyframes fadeOut{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}70%{opacity:1}100%{opacity:0;transform:translate(-50%,-60%) scale(0.95)}}";
document.head.appendChild(st);

// ────────────────── START ──────────────────
function startGame() {
  const ps = getPlayerState();
  if (!ps || ps.hearts <= 0) {
    document.getElementById("end-title").textContent = "OUT OF HEARTS";
    document.getElementById("end-title").className   = "end-title lose";
    document.getElementById("end-sub").textContent   = "Hearts regenerate 1 every 30 minutes. Come back soon!";
    document.getElementById("end-rewards").textContent = "";
    document.getElementById("end-overlay").classList.add("show");
    return;
  }
  state.hearts = Math.min(3, ps.hearts);
  updateHUD();
  state.running = true;
  loop();
}

resizeCanvas();
startGame();
